baseURL = 'https://cyber.jackrschumacher.com'
languageCode = 'en-us'
title = 'Cybersecurity Notes'

enableGitInfo = true

[frontmatter]
  lastmod = [':git', 'lastmod', 'date', 'publishDate']

[module]
  [[module.imports]]
    # 1. Update the theme module
    path = 'github.com/McShelby/hugo-theme-relearn'

[params]
  # 2. Relearn Theme equivalents for your old BookTheme settings
   themeVariant = 'custom-auto' # Automatically switches between light and dark
  
 

[taxonomies]
  category = 'categories'

[markup]
  [markup.tableOfContents]
      startLevel = 1
      endLevel = 5
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 3. Your custom menus (Note: Relearn automatically builds the main sidebar from your content folders. These will appear as top-bar or shortcut links depending on configuration)
[menu]

[[menu.shortcuts]]
  name = 'Repositories'
  url = '/Other/Repositories'
  weight = 9